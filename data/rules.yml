version: "3.1"

rules:
  - rule: Say hello on greet
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Say goodbye anytime
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Respond to thanks
    steps:
      - intent: thank
      - action: utter_thank

  - rule: Answer bot challenge
    steps:
      - intent: bot_challenge
      - action: utter_iamabot

  - rule: Calculate carbon footprint on request
    steps:
      - intent: ask_carbon_footprint
      - action: action_calculate_carbon

  - rule: Escalate to human advisor on request
    steps:
      - intent: request_human_advisor
      - action: action_human_handover

  - rule: Answer open-ended eco-travel questions with the LLM advisor
    steps:
      - intent: eco_question
      - action: action_llm_advisor

  - rule: Book a flight
    steps:
      - intent: book_flight
      - action: action_book_flight

  - rule: Show destination options on request
    steps:
      - intent: request_recommendation
      - action: action_ask_destination

  - rule: Activate form after destination selected
    steps:
      - intent: provide_trip_details
      - action: trip_intake_form
      - active_loop: trip_intake_form

  - rule: Submit trip intake form
    condition:
      - active_loop: trip_intake_form
    steps:
      - action: trip_intake_form
      - active_loop: null
      - slot_was_set:
          - requested_slot: null
      - action: utter_submit_intake
      - action: action_trip_recommendation

  - rule: Default fallback on low NLU confidence
    steps:
      - intent: nlu_fallback
      - action: action_default_fallback

  - rule: Handle weather query
    steps:
      - intent: ask_weather
      - action: action_get_weather

  - rule: Handle destination query
    steps:
      - intent: ask_destination
      - action: action_ask_destination

  - rule: Handle hotel query
    steps:
      - intent: ask_hotels
      - action: action_ask_destination

  - rule: Handle cultural query
    steps:
      - intent: ask_cultural
      - action: action_ask_destination

  - rule: Handle transport query
    steps:
      - intent: ask_transport
      - action: action_ask_destination

  - rule: Handle offset query
    steps:
      - intent: ask_offset
      - action: action_ask_destination

  - rule: Handle eco tips query
    steps:
      - intent: ask_eco_tips
      - action: action_ask_destination