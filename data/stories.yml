version: "3.1"

stories:

  - story: greet and plan trip
    steps:
      - intent: greet
      - action: utter_greet
      - intent: request_recommendation
      - action: action_ask_destination

  - story: city break high sustainability happy path
    steps:
      - intent: request_recommendation
      - action: action_ask_destination
      - intent: provide_trip_details
        entities:
          - destination: "Bali"
      - action: trip_intake_form
      - active_loop: trip_intake_form
      - active_loop: null
      - action: utter_submit_intake
      - action: action_trip_recommendation

  - story: complex trip escalated to human advisor
    steps:
      - intent: request_recommendation
      - action: action_ask_destination
      - intent: provide_trip_details
        entities:
          - destination: "Kerala"
      - action: trip_intake_form
      - active_loop: trip_intake_form
      - active_loop: null
      - action: utter_submit_intake
      - action: action_trip_recommendation
      - intent: request_human_advisor
      - action: action_human_handover

  - story: recommendation then user declines more help
    steps:
      - intent: request_recommendation
      - action: action_ask_destination
      - intent: provide_trip_details
        entities:
          - destination: "Copenhagen"
      - action: trip_intake_form
      - active_loop: trip_intake_form
      - active_loop: null
      - action: utter_submit_intake
      - action: action_trip_recommendation
      - intent: goodbye
      - action: utter_goodbye

  - story: recommendation then carbon footprint query
    steps:
      - intent: request_recommendation
      - action: action_ask_destination
      - intent: provide_trip_details
        entities:
          - destination: "Lisbon"
      - action: trip_intake_form
      - active_loop: trip_intake_form
      - active_loop: null
      - action: utter_submit_intake
      - action: action_trip_recommendation
      - intent: ask_carbon_footprint
      - action: action_calculate_carbon

  - story: direct destination query
    steps:
      - intent: ask_destination
        entities:
          - destination: "Rome"
      - action: action_ask_destination

  - story: weather then trip planning
    steps:
      - intent: ask_weather
        entities:
          - destination: "Bali"
      - action: action_get_weather
      - intent: request_recommendation
      - action: action_ask_destination