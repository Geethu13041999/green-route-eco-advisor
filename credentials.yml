# Channel credentials.
# The REST channel exposes http://localhost:5005/webhooks/rest/webhook
# which the ReactJS / Rasa Webchat frontend talks to.
rest:

# Rasa Webchat (socket.io) channel - used by the embedded web widget.
socketio:
  user_message_evt: user_uttered
  bot_message_evt: bot_uttered
  session_persistence: true
